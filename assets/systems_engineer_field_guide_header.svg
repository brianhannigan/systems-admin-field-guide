<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Systems Engineer Field Guide Header</title>
  <desc id="desc">Professional repository header for a systems engineering portfolio focused on Linux, Azure, Terraform, STIG hardening, and vulnerability remediation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f1b3d"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>

    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.10"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity="0.10" stroke-width="1"/>
    </pattern>

    <style>
      .title { font: 700 54px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; letter-spacing: 0.2px; }
      .subtitle { font: 400 22px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .small { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #e2e8f0; }
      .tiny { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; letter-spacing: 1.1px; }
      .pillText { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .chip { fill: #0f172a; stroke: #334155; stroke-width: 1.2; }
      .line { stroke: url(#accent); stroke-width: 3; stroke-linecap: round; opacity: 0.9; fill: none; }
      .outline { fill: none; stroke: #60a5fa; stroke-width: 2; opacity: 0.65; }
      .node { fill: #0f172a; stroke: #60a5fa; stroke-width: 2; }
      .panel { fill: rgba(15, 23, 42, 0.62); stroke: rgba(148, 163, 184, 0.18); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)"/>
  <rect width="1600" height="420" fill="url(#grid)"/>

  <circle cx="1380" cy="90" r="180" fill="url(#soft)"/>
  <circle cx="1480" cy="330" r="220" fill="url(#soft)"/>
  <circle cx="1240" cy="280" r="120" fill="#38bdf8" opacity="0.06"/>

  <g transform="translate(72,72)">
    <text x="0" y="0" class="tiny">PORTFOLIO-GRADE SYSTEMS ENGINEERING REPOSITORY</text>
    <text x="0" y="72" class="title">Systems Engineer Field Guide</text>
    <rect x="0" y="94" width="520" height="5" rx="3" fill="url(#accent)"/>
    <text x="0" y="148" class="subtitle">Linux · Azure · Terraform · STIG Hardening · Vulnerability Remediation</text>
    <text x="0" y="182" class="subtitle">Operational playbooks, validation workflows, and infrastructure discipline.</text>

    <g transform="translate(0,224)">
      <rect class="chip" x="0" y="0" rx="24" ry="24" width="122" height="40"/>
      <text class="pillText" x="61" y="26" text-anchor="middle">Linux Ops</text>

      <rect class="chip" x="136" y="0" rx="24" ry="24" width="108" height="40"/>
      <text class="pillText" x="190" y="26" text-anchor="middle">Azure</text>

      <rect class="chip" x="258" y="0" rx="24" ry="24" width="132" height="40"/>
      <text class="pillText" x="324" y="26" text-anchor="middle">Terraform</text>

      <rect class="chip" x="404" y="0" rx="24" ry="24" width="112" height="40"/>
      <text class="pillText" x="460" y="26" text-anchor="middle">STIG</text>

      <rect class="chip" x="530" y="0" rx="24" ry="24" width="190" height="40"/>
      <text class="pillText" x="625" y="26" text-anchor="middle">Validation Workflows</text>
    </g>

    <g transform="translate(0,300)">
      <text x="0" y="0" class="small">Built for:</text>
      <text x="98" y="0" class="subtitle">systems engineers · infrastructure engineers · security-aware operations teams</text>
    </g>
  </g>

  <g transform="translate(980,56)" filter="url(#shadow)">
    <rect x="0" y="0" width="520" height="308" rx="28" ry="28" class="panel"/>
    <text x="34" y="40" class="small">Operational Architecture</text>

    <rect x="150" y="58" width="220" height="48" rx="14" class="node"/>
    <text x="260" y="88" text-anchor="middle" class="pillText">Azure / Cloud Resources</text>

    <rect x="56" y="136" width="170" height="56" rx="16" class="node"/>
    <text x="141" y="169" text-anchor="middle" class="pillText">Linux Servers</text>

    <rect x="294" y="136" width="170" height="56" rx="16" class="node"/>
    <text x="379" y="169" text-anchor="middle" class="pillText">Windows Servers</text>

    <rect x="150" y="224" width="220" height="48" rx="14" class="node"/>
    <text x="260" y="254" text-anchor="middle" class="pillText">Terraform / Automation</text>

    <path d="M260 106 L260 132" class="line"/>
    <path d="M260 106 C260 120 141 120 141 136" class="line"/>
    <path d="M260 106 C260 120 379 120 379 136" class="line"/>
    <path d="M141 192 C141 214 260 214 260 224" class="line"/>
    <path d="M379 192 C379 214 260 214 260 224" class="line"/>

    <g transform="translate(40,286)">
      <rect x="0" y="0" width="132" height="14" rx="7" fill="#38bdf8" opacity="0.80"/>
      <rect x="146" y="0" width="132" height="14" rx="7" fill="#60a5fa" opacity="0.70"/>
      <rect x="292" y="0" width="132" height="14" rx="7" fill="#818cf8" opacity="0.70"/>
      <text x="66" y="-10" text-anchor="middle" class="tiny">HARDENING</text>
      <text x="212" y="-10" text-anchor="middle" class="tiny">MONITORING</text>
      <text x="358" y="-10" text-anchor="middle" class="tiny">REMEDIATION</text>
    </g>
  </g>

  <rect x="18" y="18" width="1564" height="384" rx="28" ry="28" class="outline"/>
</svg>
