<svg xmlns="http://www.w3.org/2000/svg" width="860" height="560" viewBox="0 0 860 560">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 400 13px Arial, sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 16; ry: 16; }
      .accent { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 16; ry: 16; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .thin { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow2); }
      .pill { fill: #ecfeff; stroke: #0f766e; stroke-width: 2; rx: 999; ry: 999; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <text x="40" y="42" class="title">Terraform Deployment Flow</text>
  <text x="40" y="68" class="subtitle">Recommended infrastructure-as-code workflow for controlled Azure changes</text>
  <rect x="40" y="140" width="180" height="70" class="box"/>
  <text x="130.0" y="169" text-anchor="middle" class="label">Author / Update Code</text>
  <text x="130.0" y="191" text-anchor="middle" class="small">modules · variables · tags</text>
  <rect x="250" y="140" width="150" height="70" class="box"/>
  <text x="325.0" y="169" text-anchor="middle" class="label">terraform fmt</text>
  <text x="325.0" y="191" text-anchor="middle" class="small">normalize style</text>
  <rect x="430" y="140" width="160" height="70" class="box"/>
  <text x="510.0" y="169" text-anchor="middle" class="label">terraform validate</text>
  <text x="510.0" y="191" text-anchor="middle" class="small">schema / syntax</text>
  <rect x="620" y="140" width="180" height="70" class="accent"/>
  <text x="710.0" y="169" text-anchor="middle" class="label">terraform plan</text>
  <text x="710.0" y="191" text-anchor="middle" class="small">review intended changes</text>
  <rect x="620" y="300" width="180" height="70" class="accent"/>
  <text x="710.0" y="329" text-anchor="middle" class="label">Approve Change</text>
  <text x="710.0" y="351" text-anchor="middle" class="small">ticket / review / sign-off</text>
  <rect x="430" y="300" width="160" height="70" class="box"/>
  <text x="510.0" y="329" text-anchor="middle" class="label">terraform apply</text>
  <text x="510.0" y="351" text-anchor="middle" class="small">deploy infrastructure</text>
  <rect x="250" y="300" width="150" height="70" class="box"/>
  <text x="325.0" y="329" text-anchor="middle" class="label">Post-Apply Validation</text>
  <text x="325.0" y="351" text-anchor="middle" class="small">health · tags · access</text>
  <rect x="40" y="300" width="180" height="70" class="accent"/>
  <text x="130.0" y="329" text-anchor="middle" class="label">State / Drift Review</text>
  <text x="130.0" y="351" text-anchor="middle" class="small">plan again · verify clean</text>
  <path d="M220 175 L245 175" class="line"/>
  <path d="M400 175 L425 175" class="line"/>
  <path d="M590 175 L615 175" class="line"/>
  <path d="M710 210 L710 295" class="line"/>
  <path d="M620 335 L595 335" class="line"/>
  <path d="M430 335 L405 335" class="line"/>
  <path d="M250 335 L225 335" class="line"/>
  <rect x="40" y="450" width="760" height="60" class="pill"/>
  <text x="420" y="476" text-anchor="middle" class="small">Operational rule: do not stop at apply — validate resources, services, access paths, monitoring, and drift state</text>
</svg>